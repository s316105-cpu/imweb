<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜歌遊戲 - Lab 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --primary: #F472B6;      /* Pink 400 */
            --primary-hover: #EC4899; /* Pink 500 */
            --bg: #FDF2F8;            /* Pink 50 */
            --card-bg: #FFFFFF;
            --text: #334155;          /* Slate 700 */
            --border: #FBCFE8;        /* Pink 200 */
            --success: #10B981;       /* Emerald 500 */
            --error: #EF4444;         /* Red 500 */
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            position: relative;
            max-width: 600px;
        }

        h1 { 
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #EC4899, #F43F5E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #64748B;
            margin: 0;
            font-weight: 600;
        }

        a.back-btn { 
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #EC4899; 
            text-decoration: none; 
            border: 1px solid rgba(236, 72, 153, 0.5); 
            padding: 0.5rem 1rem; 
            border-radius: 0.5rem; 
            transition: all 0.3s ease; 
            font-weight: 600;
            background: rgba(253, 242, 248, 0.8);
        }
        a.back-btn:hover { 
            background: rgba(236, 72, 153, 0.1); 
        }

        .game-container {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.1);
            border: 1px solid var(--border);
            text-align: center;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .timer-container {
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .timer-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .timer-bar-bg {
            width: 100%;
            height: 10px;
            background: #FCE7F3;
            border-radius: 5px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(to right, #EC4899, #F43F5E);
            transition: width 0.1s linear, background 0.3s ease;
        }

        .audio-player {
            margin: 1rem 0 2rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
            transition: transform 0.2s ease, background 0.2s ease;
            position: relative;
        }

        .play-btn:hover {
            transform: scale(1.05);
            background: var(--primary-hover);
        }

        .play-btn.playing {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(236, 72, 153, 0); }
            100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .option-btn {
            background: var(--bg);
            border: 2px solid var(--border);
            padding: 1rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .option-btn:hover:not(:disabled) {
            background: #FCE7F3;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
            animation: bounce 0.5s ease;
        }

        .option-btn.wrong {
            background: var(--error);
            color: white;
            border-color: var(--error);
            animation: shake 0.5s ease;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .final-score {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0;
        }

        .restart-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(244, 114, 182, 0.4);
        }

        .restart-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        #loading {
            display: none;
            color: var(--primary);
            font-weight: 600;
            margin-top: 1rem;
        }

    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="back-btn">← 返回</a>
        <h1>猜歌遊戲</h1>
        <p class="subtitle">聽音樂，猜歌名</p>
    </header>

    <div class="game-container" id="gameScreen">
        <div class="status-bar">
            <span id="questionCounter">題目: 1 / 4</span>
            <span id="scoreDisplay">分數: 0</span>
        </div>

        <div class="timer-container">
            <div class="timer-text" id="timerText">15s</div>
            <div class="timer-bar-bg">
                <div class="timer-bar" id="timerBar"></div>
            </div>
        </div>

        <div class="audio-player">
            <button class="play-btn" id="playBtn" title="播放/暫停">
                ▶
            </button>
        </div>
        <div id="loading">載入音樂中...</div>

        <div class="options-grid" id="optionsGrid">
            <!-- Options generated by JS -->
        </div>
    </div>

    <div class="game-container result-screen" id="resultScreen">
        <h2>遊戲結束！</h2>
        <p class="subtitle">您的最終得分：</p>
        <p class="final-score" id="finalScore">0 / 4</p>
        <button class="restart-btn" id="restartBtn">再玩一次</button>
    </div>

    <script>
        const gameData = [
            {
                correctAnswer: "我知道 - By2",
                previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview115/v4/21/cf/2b/21cf2b28-8e5c-0fe5-709f-be56295f6463/mzaf_13845116616522213011.plus.aac.p.m4a"
            },
            {
                correctAnswer: "一樣的月光 - 徐佳瑩",
                previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview125/v4/ad/d4/2c/add42cd9-589a-bc30-3c0a-bf90bcb813d4/mzaf_4292271856837762921.plus.aac.p.m4a"
            },
            {
                correctAnswer: "等下一個天亮 - 郭靜",
                previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview211/v4/98/c4/80/98c48090-38d2-22fa-ccdb-92d87146d042/mzaf_11782505966901375117.plus.aac.p.m4a"
            },
            {
                correctAnswer: "太聰明 - 陳綺貞",
                previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview125/v4/ad/6a/e3/ad6ae3e9-cdf8-2906-279a-6ec15373a145/mzaf_1471458383288659685.plus.aac.p.m4a"
            }
        ];



        let currentQuestionIndex = 0;
        let score = 0;
        let audio = new Audio();
        let isPlaying = false;
        let canPlay = false;

        const TIMER_DURATION = 15;
        let timeLeft = TIMER_DURATION;
        let timerInterval;

        const playBtn = document.getElementById('playBtn');
        const optionsGrid = document.getElementById('optionsGrid');
        const questionCounter = document.getElementById('questionCounter');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const gameScreen = document.getElementById('gameScreen');
        const resultScreen = document.getElementById('resultScreen');
        const finalScore = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const loading = document.getElementById('loading');
        const timerText = document.getElementById('timerText');
        const timerBar = document.getElementById('timerBar');

        // Utility to shuffle an array
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function updateTimerDisplay() {
            timerText.textContent = Math.ceil(timeLeft) + "s";
            const percentage = (timeLeft / TIMER_DURATION) * 100;
            timerBar.style.width = percentage + "%";
            if (timeLeft <= 5) {
                timerBar.style.background = "var(--error)";
                timerText.style.color = "var(--error)";
            } else {
                timerBar.style.background = "linear-gradient(to right, #EC4899, #F43F5E)";
                timerText.style.color = "var(--primary)";
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (isPlaying) {
                    timeLeft -= 0.1;
                    updateTimerDisplay();
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        timeLeft = 0;
                        updateTimerDisplay();
                        // Time's up! Check answer as false
                        checkAnswer(null, false);
                    }
                }
            }, 100);
        }

        function loadQuestion() {
            if (currentQuestionIndex >= gameData.length) {
                showResult();
                return;
            }

            const question = gameData[currentQuestionIndex];
            questionCounter.textContent = `題目: ${currentQuestionIndex + 1} / ${gameData.length}`;
            
            // Reset timer
            clearInterval(timerInterval);
            timeLeft = TIMER_DURATION;
            updateTimerDisplay();

            // Set up audio
            audio.src = question.previewUrl;
            audio.load();
            isPlaying = false;
            canPlay = false;
            playBtn.textContent = "⌛";
            playBtn.classList.remove('playing');
            loading.style.display = 'block';

            audio.addEventListener('canplaythrough', () => {
                canPlay = true;
                playBtn.textContent = "▶";
                loading.style.display = 'none';
            }, { once: true });

            audio.addEventListener('error', () => {
                loading.textContent = '載入失敗，請重試或檢查網路連線。';
            }, { once: true });

            // Options are fixed to the 4 songs
            let options = [
                "我知道 - By2",
                "一樣的月光 - 徐佳瑩",
                "等下一個天亮 - 郭靜",
                "太聰明 - 陳綺貞"
            ];
            options = shuffle(options);

            optionsGrid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(btn, opt === question.correctAnswer);
                optionsGrid.appendChild(btn);
            });
        }

        function togglePlay() {
            if (!canPlay) return;

            if (isPlaying) {
                audio.pause();
                playBtn.textContent = "▶";
                playBtn.classList.remove('playing');
            } else {
                audio.play();
                playBtn.textContent = "⏸";
                playBtn.classList.add('playing');
                // Ensure timer is running
                if (timeLeft === TIMER_DURATION || timeLeft < TIMER_DURATION) {
                    startTimer();
                }
            }
            isPlaying = !isPlaying;
        }

        audio.addEventListener('ended', () => {
            isPlaying = false;
            playBtn.textContent = "▶";
            playBtn.classList.remove('playing');
        });

        playBtn.addEventListener('click', togglePlay);

        function checkAnswer(selectedBtn, isCorrect) {
            // Stop timer
            clearInterval(timerInterval);

            // Disable all buttons
            const allBtns = optionsGrid.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            // Stop audio
            audio.pause();
            isPlaying = false;
            playBtn.textContent = "▶";
            playBtn.classList.remove('playing');

            if (isCorrect && selectedBtn) {
                selectedBtn.classList.add('correct');
                score++;
                scoreDisplay.textContent = `分數: ${score}`;
            } else {
                if (selectedBtn) {
                    selectedBtn.classList.add('wrong');
                }
                // Highlight the correct answer
                const correctOption = gameData[currentQuestionIndex].correctAnswer;
                allBtns.forEach(b => {
                    if (b.textContent === correctOption) {
                        b.classList.add('correct');
                    }
                });
            }

            // Next question after delay
            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 2000);
        }

        function showResult() {
            gameScreen.style.display = 'none';
            resultScreen.style.display = 'flex';
            finalScore.textContent = `${score} / ${gameData.length}`;
        }

        restartBtn.addEventListener('click', () => {
            currentQuestionIndex = 0;
            score = 0;
            scoreDisplay.textContent = `分數: 0`;
            gameScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            loadQuestion();
        });

        // Initialize game
        loadQuestion();

    </script>
</body>
</html>
