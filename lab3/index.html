<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸運抽籤筒 - Lab 3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Serif+TC:wght@700&display=swap');
        
        :root {
            --primary: #F472B6;      /* Pink 400 */
            --primary-hover: #EC4899; /* Pink 500 */
            --bg: #FDF2F8;            /* Pink 50 */
            --card-bg: #FFFFFF;
            --text: #334155;          /* Slate 700 */
            --border: #FBCFE8;        /* Pink 200 */
            
            /* Omikuji specific colors */
            --cylinder-color: #FBCFE8;
            --cylinder-dark: #F472B6;
            --stick-color: #FDE047;   /* Yellow 300 / Wood-like in pink context */
            --stick-text: #B45309;    /* Dark amber */
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
            overflow: hidden; /* Prevent scroll during shake */
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            width: 100%;
            position: relative;
            max-width: 600px;
        }

        h1 { 
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #EC4899, #F43F5E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #64748B;
            margin: 0;
            font-weight: 600;
        }

        a.back-btn { 
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #EC4899; 
            text-decoration: none; 
            border: 1px solid rgba(236, 72, 153, 0.5); 
            padding: 0.5rem 1rem; 
            border-radius: 0.5rem; 
            transition: all 0.3s ease; 
            font-weight: 600;
            background: rgba(253, 242, 248, 0.8);
            z-index: 10;
        }
        a.back-btn:hover { 
            background: rgba(236, 72, 153, 0.1); 
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
            flex-grow: 1;
            justify-content: center;
            padding-bottom: 4rem;
        }

        /* --- Animation Area --- */
        .stage {
            position: relative;
            width: 200px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .stick {
            position: absolute;
            bottom: 50px; /* Hidden inside cylinder initially */
            width: 30px;
            height: 150px;
            background: var(--stick-color);
            border: 2px solid #CA8A04;
            border-radius: 4px;
            z-index: 1; /* Behind the front of cylinder, but we'll fake it by putting it behind the whole cylinder first */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 10px;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(0);
        }

        .stick span {
            writing-mode: vertical-rl;
            text-orientation: upright;
            color: var(--stick-text);
            font-family: 'Noto Serif TC', serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .cylinder {
            position: absolute;
            bottom: 0;
            width: 140px;
            height: 220px;
            background: linear-gradient(135deg, var(--cylinder-color), var(--cylinder-dark));
            border-radius: 10px 10px 30px 30px;
            box-shadow: 
                inset -10px -10px 20px rgba(0,0,0,0.1),
                inset 10px 10px 20px rgba(255,255,255,0.5),
                0 15px 25px rgba(236, 72, 153, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transform-origin: bottom center;
        }

        .cylinder::before {
            content: '';
            position: absolute;
            top: -10px;
            width: 120px;
            height: 20px;
            background: #E2E8F0;
            border-radius: 50%;
            border: 4px solid var(--cylinder-dark);
            z-index: 3;
        }

        .cylinder-label {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-family: 'Noto Serif TC', serif;
            font-size: 2.5rem;
            color: white;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 5px;
        }

        /* --- Animations --- */
        .shake {
            animation: shake-anim 0.3s infinite;
        }

        @keyframes shake-anim {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-15deg); }
            100% { transform: rotate(0deg); }
        }

        .draw-stick {
            animation: draw-anim 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes draw-anim {
            0% { 
                transform: translateY(0); 
                opacity: 1;
            }
            100% { 
                transform: translateY(-160px); 
                opacity: 1;
            }
        }

        /* --- Controls & Modals --- */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 3rem;
            border-radius: 9999px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(244, 114, 182, 0.4);
            font-family: inherit;
        }

        .btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(244, 114, 182, 0.5);
        }

        .btn:disabled {
            background: #CBD5E1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(253, 242, 248, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 4rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(236, 72, 153, 0.2);
            border: 2px solid var(--border);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .fortune-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 5rem;
            font-weight: 800;
            margin: 0 0 2rem 0;
            color: var(--primary);
            text-shadow: 2px 2px 0px var(--border);
        }

        .fortune-desc {
            color: var(--text);
            font-size: 1.2rem;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="back-btn">← 返回</a>
        <h1>幸運抽籤筒</h1>
        <p class="subtitle">搖一搖，看看今天的運勢！</p>
    </header>

    <main>
        <div class="stage">
            <!-- 隱藏在籤筒後方的籤 -->
            <div id="stick" class="stick">
                <span id="stickText"></span>
            </div>
            <!-- 籤筒本體 -->
            <div id="cylinder" class="cylinder">
                <div class="cylinder-label">御籤</div>
            </div>
        </div>

        <button id="drawBtn" class="btn">開始抽籤</button>
    </main>

    <!-- 結果彈出視窗 -->
    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="fortuneTitle" class="fortune-title">大吉</h2>
            <p id="fortuneDesc" class="fortune-desc">幸運女神降臨！<br>今天做什麼都會順順利利，充滿好運的一天。</p>
            <button id="closeModalBtn" class="btn">再抽一次</button>
        </div>
    </div>

    <script>
        const drawBtn = document.getElementById('drawBtn');
        const cylinder = document.getElementById('cylinder');
        const stick = document.getElementById('stick');
        const stickText = document.getElementById('stickText');
        const resultModal = document.getElementById('resultModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const fortuneTitle = document.getElementById('fortuneTitle');
        const fortuneDesc = document.getElementById('fortuneDesc');

        const fortunes = [
            { title: "大吉", desc: "幸運女神降臨！<br>今天做什麼都會順順利利，充滿好運的一天。" },
            { title: "中吉", desc: "好運連連！<br>會有一些意想不到的小確幸發生喔。" },
            { title: "小吉", desc: "平穩踏實！<br>雖然沒有大驚喜，但平安就是福。" },
            { title: "吉", desc: "運氣不錯！<br>保持愉悅的心情，好事自然會發生。" },
            { title: "末吉", desc: "倒吃甘蔗！<br>遇到困難不要放棄，最終會有好結果的。" },
            { title: "凶", desc: "稍有阻礙。<br>今天行事請多加小心，凡事三思而後行。" },
            { title: "大凶", desc: "烏雲密布。<br>建議今天低調行事，早點回家休息保平安。" }
        ];

        // 延遲工具函數
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function drawFortune() {
            // 1. 禁用按鈕防連點，重置狀態
            drawBtn.disabled = true;
            drawBtn.textContent = "搖晃中...";
            stick.classList.remove('draw-stick');
            stick.style.opacity = '0';
            stick.style.zIndex = '1';

            // 2. 開始搖晃籤筒
            cylinder.classList.add('shake');
            
            // 搖晃 1.5 秒
            await delay(1500);
            
            // 3. 停止搖晃
            cylinder.classList.remove('shake');

            // 4. 決定籤運
            const randomIndex = Math.floor(Math.random() * fortunes.length);
            const selectedFortune = fortunes[randomIndex];
            
            // 將結果寫在竹籤上
            stickText.textContent = selectedFortune.title;
            
            // 為了讓籤看起來是從洞口抽出來，設定 z-index
            stick.style.zIndex = '4'; // 高於 cylinder::before

            // 5. 播放抽出動畫
            stick.classList.add('draw-stick');
            
            // 等待抽出動畫完成 (1 秒) + 短暫停頓
            await delay(1200);

            // 6. 顯示結果彈出視窗
            fortuneTitle.textContent = selectedFortune.title;
            fortuneDesc.innerHTML = selectedFortune.desc;
            
            // 根據吉凶設定不同的顏色
            if (selectedFortune.title.includes("大吉")) {
                fortuneTitle.style.color = "#EC4899"; // 粉色
            } else if (selectedFortune.title.includes("凶")) {
                fortuneTitle.style.color = "#64748B"; // 灰色
            } else {
                fortuneTitle.style.color = "#F472B6"; // 淺粉色
            }

            resultModal.classList.add('active');
        }

        // 綁定抽籤按鈕
        drawBtn.addEventListener('click', drawFortune);

        // 綁定再抽一次按鈕
        closeModalBtn.addEventListener('click', () => {
            resultModal.classList.remove('active');
            
            // 重置狀態
            setTimeout(() => {
                stick.classList.remove('draw-stick');
                stick.style.opacity = '0';
                stick.style.zIndex = '1';
                drawBtn.disabled = false;
                drawBtn.textContent = "開始抽籤";
            }, 400); // 等待 modal 淡出動畫完成
        });

    </script>
</body>
</html>
