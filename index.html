<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Project Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --primary: #4F46E5;
            --bg: #0F172A;
            --text: #F8FAFC;
            --card-bg: #1E293B;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818CF8, #C084FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 2.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to right, #818CF8, #C084FC);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        .card:hover::before {
            transform: scaleX(1);
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3);
            border-color: rgba(255,255,255,0.1);
        }
        .card h2 { 
            margin-top: 0; 
            color: #E2E8F0; 
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .card p { 
            color: #94A3B8; 
            margin-bottom: 0; 
            font-size: 1.1rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>Web Project Portfolio</h1>
    <div class="grid">
        <a href="lab1/index.html" class="card">
            <h2>Lab 1</h2>
            <p>猜歌遊戲<br>Guess the Song</p>
        </a>
        <a href="lab2/index.html" class="card">
            <h2>Lab 2</h2>
            <p>照相亭<br>Photo Booth</p>
        </a>
        <a href="lab3/index.html" class="card">
            <h2>Lab 3</h2>
            <p>自己發想<br>Custom Project</p>
        </a>
    </div>
</body>
</html>
