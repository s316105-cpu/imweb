<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Project Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --primary: #F472B6;
            --bg: #FFF0F5; /* LavenderBlush */
            --text: #4A044E;
            --card-bg: #FFFFFF;
            --card-shadow: rgba(236, 72, 153, 0.15);
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#FBCFE8 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text);
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 2rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            text-shadow: 2px 2px 4px rgba(251, 207, 232, 0.5);
        }
        h1 span {
            background: linear-gradient(to right, #F472B6, #DB2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px var(--card-shadow), 0 4px 6px -4px var(--card-shadow); 
            border: 2px solid #FCE7F3;
            position: relative;
            overflow: hidden;
        }
        .card::after {
            content: '🎀';
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.8rem;
            opacity: 0.9;
            transition: transform 0.3s ease;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(to right, #F472B6, #DB2777);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        .card:hover::after {
            transform: scale(1.2) rotate(15deg);
        }
        .card:hover::before {
            transform: scaleX(1);
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px var(--card-shadow), 0 8px 10px -6px var(--card-shadow);
            border-color: #FBCFE8;
        }
        .card h2 { 
            margin-top: 0; 
            color: #831843; 
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            padding-right: 2rem;
        }
        .card p { 
            color: #BE185D; 
            margin-bottom: 0; 
            font-size: 1.1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>🎀 <span>Web Project Portfolio</span> 🎀</h1>
    <div class="grid">
        <a href="lab1/index.html" class="card">
            <h2>Lab 1</h2>
            <p>猜歌遊戲<br>Guess the Song</p>
        </a>
        <a href="lab2/index.html" class="card">
            <h2>Lab 2</h2>
            <p>照相亭<br>Photo Booth</p>
        </a>
        <a href="lab3/index.html" class="card">
            <h2>Lab 3</h2>
            <p>抽籤<br>Lucky Draw</p>
        </a>
    </div>
</body>
</html>
