<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二林工商互動測驗 - Lab 5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --primary: #F472B6;       /* Pink 400 */
            --primary-hover: #EC4899; /* Pink 500 */
            --bg: #FFF0F5;             /* LavenderBlush */
            --card-bg: #FFFFFF;
            --text: #4A044E;           /* Deep Violet */
            --text-muted: #BE185D;     /* Dark Pink */
            --border: #FCE7F3;         /* Pink 100 */
            --border-hover: #FBCFE8;   /* Pink 200 */
            --success: #10B981;        /* Emerald 500 */
            --error: #EF4444;          /* Red 500 */
            --shadow: rgba(236, 72, 153, 0.12);
        }

        body { 
            font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(#FBCFE8 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            color: var(--text); 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            position: relative;
            max-width: 650px;
        }

        h1 { 
            font-size: 2.4rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #EC4899, #DB2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            margin: 0;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        a.back-btn { 
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #EC4899; 
            text-decoration: none; 
            border: 2px solid #FCE7F3; 
            padding: 0.6rem 1.2rem; 
            border-radius: 1rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            font-weight: 700;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 6px var(--shadow);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        a.back-btn:hover { 
            background: #FFF5F7;
            border-color: #FBCFE8;
            transform: translateY(-50%) translateX(-3px);
            box-shadow: 0 6px 12px var(--shadow);
        }

        /* Container */
        .quiz-container {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 15px 35px var(--shadow);
            border: 2px solid #FCE7F3;
            box-sizing: border-box;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Progress Area */
        .progress-container {
            margin-bottom: 2rem;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #FCE7F3;
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #EC4899, #DB2777);
            border-radius: 99px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Question Card */
        .question-section h2 {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-top: 0;
            margin-bottom: 1.8rem;
            color: #831843;
            font-weight: 700;
        }

        /* Option Grid */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .option-btn {
            background: #FFF5F7;
            border: 2px solid var(--border);
            padding: 1.1rem 1.5rem;
            border-radius: 1.2rem;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            text-align: left;
            position: relative;
            outline: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            background: #FFFFFF;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(236, 72, 153, 0.08);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .option-btn.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            animation: bounce 0.4s ease;
        }

        .option-btn.wrong {
            background: var(--error);
            color: white;
            border-color: var(--error);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            animation: shake 0.4s ease;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .option-btn.correct:disabled, .option-btn.wrong:disabled {
            opacity: 1; /* Keep colored feedback solid */
        }

        /* Badge/Checkmarks inside button */
        .option-icon {
            font-size: 1.2rem;
            font-weight: 900;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-6px); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Explanation Panel */
        .explanation-panel {
            background: #FFF9FA;
            border: 2px dashed #FBCFE8;
            border-radius: 1.2rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            display: none;
        }

        .explanation-title {
            font-weight: 700;
            color: #DB2777;
            margin-top: 0;
            margin-bottom: 0.6rem;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .explanation-text {
            color: #831843;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Action Buttons */
        .next-btn, .restart-btn {
            background: linear-gradient(to right, #EC4899, #DB2777);
            color: white;
            border: none;
            padding: 1.1rem 2.2rem;
            border-radius: 1.2rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 16px rgba(236, 72, 153, 0.25);
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            margin-top: 1.5rem;
        }

        .next-btn:hover, .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.35);
            background: linear-gradient(to right, #F472B6, #EC4899);
        }

        .next-btn:active, .restart-btn:active {
            transform: translateY(0);
        }

        /* Result Screen */
        .result-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .result-screen h2 {
            font-size: 2rem;
            color: #831843;
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-weight: 900;
        }

        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFF0F5 0%, #FFE4E1 100%);
            border: 4px solid #FBCFE8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 2rem 0;
            box-shadow: inset 0 4px 10px rgba(236, 72, 153, 0.1), 0 8px 20px var(--shadow);
            position: relative;
        }

        .score-number {
            font-size: 3.5rem;
            font-weight: 900;
            color: #DB2777;
            line-height: 1;
        }

        .score-label {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-top: 0.3rem;
        }

        .rank-badge {
            background: linear-gradient(to right, #F472B6, #DB2777);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 10px rgba(236, 72, 153, 0.2);
            letter-spacing: 1px;
        }

        .result-feedback {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-muted);
            max-width: 480px;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        /* Custom Responsive styling */
        @media (max-width: 600px) {
            body {
                padding: 1.5rem 0.8rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            a.back-btn {
                position: relative;
                top: 0;
                transform: none;
                display: inline-flex;
                margin-bottom: 1rem;
            }
            header {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 1.5rem;
            }
            .quiz-container {
                padding: 1.5rem;
                border-radius: 1.5rem;
            }
            .score-circle {
                width: 130px;
                height: 130px;
            }
            .score-number {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="back-btn">
            <span>← 返回首頁</span>
        </a>
        <h1>🎀 <span>二林工商互動測驗</span> 🎀</h1>
        <p class="subtitle">來測測看你對二林工商的了解程度吧！</p>
    </header>

    <!-- Quiz Screen -->
    <div class="quiz-container" id="quizScreen">
        <!-- Progress -->
        <div class="progress-container">
            <div class="status-bar">
                <span id="questionCounter">題目: 1 / 10</span>
                <span id="scoreDisplay">得分: 0</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <!-- Question Section -->
        <div class="question-section" id="questionSection">
            <h2 id="questionText">載入題目中...</h2>
            
            <div class="options-grid" id="optionsGrid">
                <!-- Option Buttons will be generated by JS -->
            </div>
        </div>

        <!-- Explanation Panel (revealed after answering) -->
        <div class="explanation-panel" id="explanationPanel">
            <h3 class="explanation-title" id="explanationTitle">
                💡 知識大解析
            </h3>
            <p class="explanation-text" id="explanationText">
                解析內容...
            </p>
            <button class="next-btn" id="nextBtn">
                下一題 ➔
            </button>
        </div>
    </div>

    <!-- Result Screen -->
    <div class="quiz-container result-screen" id="resultScreen">
        <h2>測驗完成！</h2>
        <div class="score-circle">
            <span class="score-number" id="finalScore">0</span>
            <span class="score-label" id="finalScoreLabel">總分 100 分</span>
        </div>
        <div class="rank-badge" id="rankBadge">稱號</div>
        <p class="result-feedback" id="resultFeedback">
            回饋評語...
        </p>
        <button class="restart-btn" id="restartBtn">
            再玩一次 ↺
        </button>
    </div>

    <script>
        // 10 high-quality trivia questions about Erlin High School (二林工商)
        const quizData = [
            {
                question: "二林工商創校於日治時期西元哪一年？",
                options: ["1937年", "1945年", "1950年", "1966年"],
                answer: 0,
                explanation: "二林工商創立於日治時期的 1937 年（昭和 12 年）3 月 31 日，是彰化西南角歷史非常悠久且深具傳統的技術型高中。"
            },
            {
                question: "二林工商在體育界享有盛名，素有什麼運動的「搖籃」之美譽？",
                options: ["籃球搖籃", "拳擊搖籃", "桌球搖籃", "羽球搖籃"],
                answer: 1,
                explanation: "二林工商拳擊隊戰績輝煌、歷史悠久，曾培育出無數優秀的國手與教練，在國內技擊界享有「拳擊搖籃」的極高評價！"
            },
            {
                question: "二林工商的八字校訓是下列哪一個？",
                options: ["禮義廉恥、誠樸精勤", "忠誠精實、敦品勵學", "誠正勤樸、開物成務", "仁義禮智、博學篤行"],
                answer: 1,
                explanation: "二林工商的校訓是「忠誠精實、敦品勵學」，旨在期許二林工商學子在學習專業技能之餘，更能涵養優良的道德品格。"
            },
            {
                question: "二林工商創校時的最早校名是什麼？",
                options: ["台中州立北斗興農國民學校", "彰化縣立二林初級農業學校", "台灣省立二林農工職業學校", "台中州立彰化商業學校"],
                answer: 0,
                explanation: "創校時名為「台中州立北斗興農國民學校」，日後隨著教育制度變遷，歷經實踐農業學校、省立農工等階段，發展為今天的規模。"
            },
            {
                question: "二林工商在西元哪一年因為「精省」政策，正式改隸為「國立二林高級工商職業學校」？",
                options: ["1997年", "2000年", "2004年", "2012年"],
                answer: 1,
                explanation: "在 2000 年（民國 89 年）2 月 1 日，配合省政府功能業務與組織調整（精省），學校正式改隸中央，更名為「國立二林高級工商職業學校」。"
            },
            {
                question: "二林工商目前日校技術類科中，「沒有」開設以下哪一個科系？",
                options: ["室內空間設計科", "汽車科", "建築科", "資料處理科"],
                answer: 1,
                explanation: "日校技術類科包含商業經營、資料處理、機械、電機、電子、室內空間設計、建築以及綜合職能科。目前並無開設汽車科。"
            },
            {
                question: "下列哪一個科系屬於二林工商目前開設的「實用技能學程」之一？",
                options: ["裝潢技術科", "觀光事業科", "幼兒保育科", "美容美髮科"],
                answer: 0,
                explanation: "二林工商開辦的實用技能學程包括「裝潢技術科」、「機械加工科」與「電機修護科」，提供極具就業競爭力的技術養成訓練。"
            },
            {
                question: "二林工商校歌歌詞最後一句是「○○○○為國爭光」，請問○○○○指的是？",
                options: ["二林工商", "二林農工", "彰化二工", "二林高中"],
                answer: 0,
                explanation: "校歌結尾歌詞為「師生相礪切符眾望，二林工商為國爭光」，表達了全校同心協力、爭取榮譽的堅定精神！"
            },
            {
                question: "二林工商位於彰化縣的哪一個行政區？",
                options: ["北斗鎮", "溪湖鎮", "二林鎮", "埤頭鄉"],
                answer: 2,
                explanation: "二林工商座落於彰化縣二林鎮斗苑路四段 84 號，是彰化西南角地區不可或缺的學術與技職人才培育重鎮。"
            },
            {
                question: "二林工商近年因應政策，已正式「停止招收」哪一種學制？",
                options: ["綜合高中", "技術型高中", "實用技能學程", "進修部"],
                answer: 0,
                explanation: "為回歸技術型高中之專業發展，並使資源更加集中，二林工商近年已正式宣告停招「綜合高中」學制，回歸專業科系。"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;
        let shuffledQuestions = [];

        // DOM elements
        const quizScreen = document.getElementById('quizScreen');
        const resultScreen = document.getElementById('resultScreen');
        const questionCounter = document.getElementById('questionCounter');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const progressBar = document.getElementById('progressBar');
        const questionText = document.getElementById('questionText');
        const optionsGrid = document.getElementById('optionsGrid');
        
        const explanationPanel = document.getElementById('explanationPanel');
        const explanationTitle = document.getElementById('explanationTitle');
        const explanationText = document.getElementById('explanationText');
        const nextBtn = document.getElementById('nextBtn');
        
        const finalScore = document.getElementById('finalScore');
        const rankBadge = document.getElementById('rankBadge');
        const resultFeedback = document.getElementById('resultFeedback');
        const restartBtn = document.getElementById('restartBtn');

        // Shuffle utility
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Initialize / Start Game
        function startGame() {
            // Shuffle the order of the questions to make replaying fun!
            shuffledQuestions = shuffleArray(quizData);
            currentQuestionIndex = 0;
            score = 0;
            
            quizScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            scoreDisplay.textContent = `得分: 0`;
            
            loadQuestion();
        }

        // Load current question
        function loadQuestion() {
            answered = false;
            explanationPanel.style.display = 'none';
            
            const q = shuffledQuestions[currentQuestionIndex];
            
            // Update counter and progress bar
            questionCounter.textContent = `題目: ${currentQuestionIndex + 1} / ${shuffledQuestions.length}`;
            const progressPercentage = ((currentQuestionIndex) / shuffledQuestions.length) * 100;
            progressBar.style.width = `${progressPercentage}%`;
            
            // Set question text
            questionText.textContent = `${currentQuestionIndex + 1}. ${q.question}`;
            
            // Clear options and render new ones
            optionsGrid.innerHTML = '';
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>${option}</span>`;
                btn.onclick = () => selectOption(btn, index);
                optionsGrid.appendChild(btn);
            });
        }

        // Handle option selection
        function selectOption(selectedBtn, selectedIndex) {
            if (answered) return;
            answered = true;

            const q = shuffledQuestions[currentQuestionIndex];
            const allButtons = optionsGrid.querySelectorAll('.option-btn');

            // Disable all option buttons
            allButtons.forEach(btn => btn.disabled = true);

            // Check if answer is correct
            const isCorrect = (selectedIndex === q.answer);
            
            if (isCorrect) {
                selectedBtn.classList.add('correct');
                selectedBtn.insertAdjacentHTML('beforeend', '<span class="option-icon">✓</span>');
                score++;
                scoreDisplay.textContent = `得分: ${score}`;
            } else {
                selectedBtn.classList.add('wrong');
                selectedBtn.insertAdjacentHTML('beforeend', '<span class="option-icon">✗</span>');
                
                // Show the correct button
                allButtons[q.answer].classList.add('correct');
                allButtons[q.answer].insertAdjacentHTML('beforeend', '<span class="option-icon">✓</span>');
            }

            // Show explanation panel
            explanationTitle.innerHTML = isCorrect ? '💡 答對了！知識大解析' : '💡 答錯了！正確解析在此';
            explanationTitle.style.color = isCorrect ? 'var(--success)' : 'var(--error)';
            explanationText.textContent = q.explanation;
            
            // Smoothly display explanation
            explanationPanel.style.display = 'block';
            explanationPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            // Update progress bar to include the completed question
            setTimeout(() => {
                const nextPercentage = ((currentQuestionIndex + 1) / shuffledQuestions.length) * 100;
                progressBar.style.width = `${nextPercentage}%`;
            }, 300);
        }

        // Move to next question
        nextBtn.onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < shuffledQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        // Show final results
        function showResults() {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'flex';
            
            // Dynamic score (10 points per question)
            const finalPoints = score * 10;
            finalScore.textContent = finalPoints;
            
            let rank = "";
            let feedback = "";
            
            if (finalPoints === 100) {
                rank = "🏆 神級二工通";
                feedback = "太厲害了！你對二林工商的歷史、校訓及科系瞭如指掌，簡直是活生生的二工百科全書！";
            } else if (finalPoints >= 70) {
                rank = "✨ 資深二工人";
                feedback = "表現非常出色！你對二林工商有極深的了解，是個非常優秀的二工人！";
            } else if (finalPoints >= 40) {
                rank = "🍀 二工小能手";
                feedback = "不錯唷！你已經掌握了二林工商的基本知識，再多了解一下校園趣事，一定能獲得滿分！";
            } else {
                rank = "🌱 二工新鮮人";
                feedback = "沒關係，二林工商歷史深厚，還有許多寶藏等待你發掘！再玩一次，把這些有趣的知識記下來吧！";
            }
            
            rankBadge.textContent = rank;
            resultFeedback.textContent = feedback;
        }

        // Restart Game
        restartBtn.onclick = startGame;

        // Initialize game on load
        window.onload = startGame;
    </script>
</body>
</html>
