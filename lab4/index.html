<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動歡迎看板 - Lab 4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            /* Preset theme variables (Neon Cyberpunk default) */
            --primary: #F472B6;
            --primary-hover: #EC4899;
            --bg-gradient: linear-gradient(135deg, #0F172A 0%, #1E1B4B 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(244, 114, 182, 0.2);
            --text: #F1F5F9;
            --text-muted: #94A3B8;
            --accent: #38BDF8; /* Cyan */
            --accent-rgb: 56, 189, 248;
            --primary-rgb: 244, 114, 182;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        /* Sakura Blossom Theme */
        body.theme-sakura {
            --primary: #EC4899;
            --primary-hover: #DB2777;
            --bg-gradient: linear-gradient(135deg, #FFF0F5 0%, #FFE4E1 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(236, 72, 153, 0.25);
            --text: #4A044E;
            --text-muted: #BE185D;
            --accent: #F472B6;
            --accent-rgb: 244, 114, 182;
            --primary-rgb: 236, 72, 153;
            --shadow: rgba(236, 72, 153, 0.1);
        }

        /* Golden Celebration Theme */
        body.theme-gold {
            --primary: #F59E0B; /* Amber */
            --primary-hover: #D97706;
            --bg-gradient: linear-gradient(135deg, #18181B 0%, #27272A 100%);
            --card-bg: rgba(39, 39, 42, 0.8);
            --card-border: rgba(245, 158, 11, 0.3);
            --text: #F4F4F5;
            --text-muted: #A1A1AA;
            --accent: #FBBF24;
            --accent-rgb: 251, 191, 36;
            --primary-rgb: 245, 158, 11;
            --shadow: rgba(0, 0, 0, 0.6);
        }

        /* Erlin Greenery Theme */
        body.theme-green {
            --primary: #10B981; /* Emerald */
            --primary-hover: #059669;
            --bg-gradient: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(16, 185, 129, 0.25);
            --text: #064E3B;
            --text-muted: #047857;
            --accent: #34D399;
            --accent-rgb: 52, 211, 153;
            --primary-rgb: 16, 185, 129;
            --shadow: rgba(16, 185, 129, 0.1);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            margin: 0;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            transition: background 0.5s ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto 1.5rem auto;
            position: relative;
        }

        .header-title-area {
            display: flex;
            flex-direction: column;
        }

        header h1 {
            font-size: 2rem;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0.2rem 0 0 0;
            font-weight: 600;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-link {
            color: var(--primary);
            text-decoration: none;
            border: 2px solid var(--card-border);
            padding: 0.6rem 1.2rem;
            border-radius: 1rem;
            font-weight: 700;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px var(--shadow);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
        }

        .btn-link:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* Layout Grid */
        .app-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 1.5rem;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            flex: 1;
        }

        /* Welcome Board Wrapper (Left) */
        .board-wrapper {
            position: relative;
            background: var(--card-bg);
            border-radius: 2rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 20px 45px var(--shadow);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Welcome Board Canvas Area */
        .canvas-area {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden;
            min-height: 400px;
        }

        #interactiveCanvas {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Countdown text */
        .countdown-overlay {
            position: absolute;
            font-size: 8rem;
            font-weight: 900;
            color: #FFF;
            text-shadow: 0 0 20px rgba(var(--primary-rgb), 0.8), 0 0 40px #000;
            animation: pulse 1s infinite;
            display: none;
            z-index: 10;
            pointer-events: none;
        }

        /* Camera Flash Overlay */
        .flash-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #FFF;
            opacity: 0;
            z-index: 11;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        /* Energy & Status Bar at bottom of screen */
        .board-footer {
            padding: 1.2rem 1.8rem;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
        }

        .energy-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
        }

        .energy-label {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--primary);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .energy-bar-bg {
            flex: 1;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .energy-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            border-radius: 99px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(var(--primary-rgb), 0.5);
        }

        .motion-badge {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.3rem 0.8rem;
            border-radius: 99px;
            background: rgba(var(--primary-rgb), 0.15);
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Control Panel (Right) */
        .control-panel {
            background: var(--card-bg);
            border-radius: 2rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 20px 45px var(--shadow);
            backdrop-filter: blur(12px);
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-sizing: border-box;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
            transition: all 0.3s ease;
        }

        .panel-section-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
            border-left: 4px solid var(--primary);
            padding-left: 0.6rem;
            margin: 0 0 0.8rem 0;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
            opacity: 0.9;
        }

        .input-group input, .input-group select {
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--card-border);
            color: var(--text);
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(var(--primary-rgb), 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        /* Theme choices */
        .theme-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
        }

        .theme-btn {
            padding: 0.8rem;
            border: 2px solid var(--card-border);
            border-radius: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .theme-btn.active {
            border-color: var(--primary);
            background: rgba(var(--primary-rgb), 0.15);
            box-shadow: 0 4px 6px rgba(var(--primary-rgb), 0.1);
        }

        /* Sticker grid */
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.6rem;
        }

        .sticker-btn {
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--card-border);
            border-radius: 0.8rem;
            font-size: 1.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .sticker-btn:hover {
            transform: scale(1.15);
            border-color: var(--primary);
        }

        .sticker-btn.active {
            background: rgba(var(--primary-rgb), 0.25);
            border-color: var(--primary);
        }

        /* Action triggers */
        .action-btn {
            background: linear-gradient(to right, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(var(--primary-rgb), 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(var(--primary-rgb), 0.35);
            opacity: 0.95;
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn.secondary {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--card-border);
            color: var(--text);
            box-shadow: none;
        }

        .action-btn.secondary:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--primary);
        }

        /* Hidden video stream element */
        #webcamStream {
            display: none;
        }

        /* Welcome Message Overlay (When energy is full) */
        .celebration-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .celebration-overlay.active {
            opacity: 1;
        }

        .celebration-text {
            font-size: 4rem;
            font-weight: 900;
            color: #FFF;
            margin: 0;
            letter-spacing: 2px;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-shadow: 0 0 20px rgba(var(--primary-rgb), 0.8), 0 0 4px #000;
        }

        .celebration-sub {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin: 0.5rem 0 0 0;
            text-shadow: 0 2px 4px #000;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 0.8; }
            70% { transform: scale(0.9); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Mobile Layout */
        @media (max-width: 950px) {
            .app-grid {
                grid-template-columns: 1fr;
            }
            .control-panel {
                max-height: none;
            }
        }

        /* Fullscreen View adjustments */
        body.fullscreen-mode {
            padding: 0;
            overflow: hidden;
        }

        body.fullscreen-mode header {
            display: none;
        }

        body.fullscreen-mode .app-grid {
            grid-template-columns: 1fr;
            max-width: 100%;
            height: 100vh;
            margin: 0;
        }

        body.fullscreen-mode .board-wrapper {
            border-radius: 0;
            border: none;
            height: 100vh;
        }

        body.fullscreen-mode .control-panel {
            display: none;
        }

        /* Floating controls inside full screen mode */
        .fs-exit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--primary);
            color: #FFF;
            padding: 0.6rem 1.2rem;
            border-radius: 99px;
            font-weight: 800;
            cursor: pointer;
            display: none;
            backdrop-filter: blur(5px);
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        body.fullscreen-mode .fs-exit-btn {
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title-area">
            <h1>✨ <span>互動歡迎看板</span> ✨</h1>
            <p class="header-subtitle" id="headerSubtitleText">二林工商社團體驗日 ── 鏡頭手勢互動歡迎牆</p>
        </div>
        <div class="nav-buttons">
            <a href="../index.html" class="btn-link">← 返回首頁</a>
        </div>
    </header>

    <div class="app-grid">
        <!-- Interactive Welcome Board (Left) -->
        <div class="board-wrapper" id="boardWrapper">
            <button class="fs-exit-btn" id="fsExitBtn">退出全螢幕 [ESC]</button>
            
            <div class="canvas-area">
                <canvas id="interactiveCanvas"></canvas>
                <div class="countdown-overlay" id="countdownOverlay">3</div>
                <div class="flash-overlay" id="flashOverlay"></div>
                
                <!-- Celebration overlay -->
                <div class="celebration-overlay" id="celebrationOverlay">
                    <p class="celebration-text" id="celebrationTitle">🎉 歡迎新社員 🎉</p>
                    <p class="celebration-sub" id="celebrationSub">二工大家庭歡迎你！</p>
                </div>
            </div>
            
            <!-- Energy Bar & Motion Status Footer -->
            <div class="board-footer">
                <div class="energy-section">
                    <span class="energy-label">
                        🔥 熱情歡迎值:
                    </span>
                    <div class="energy-bar-bg">
                        <div class="energy-bar" id="energyBar"></div>
                    </div>
                </div>
                <div class="motion-badge" id="motionBadge">
                    📷 鏡頭感應中
                </div>
            </div>
        </div>

        <!-- Customizer Panel (Right) -->
        <div class="control-panel" id="controlPanel">
            <div>
                <h3 class="panel-section-title">✍️ 看板文字設定</h3>
                <div class="input-group">
                    <label for="clubNameInput">社團名稱</label>
                    <input type="text" id="clubNameInput" value="二林資訊研究社" placeholder="請輸入社團名稱...">
                </div>
                <div class="input-group">
                    <label for="welcomeMsgInput">歡迎標語</label>
                    <input type="text" id="welcomeMsgInput" value="今日社課：AI 互動新視界" placeholder="請輸入歡迎標語...">
                </div>
            </div>

            <div>
                <h3 class="panel-section-title">🎨 看板風格主題</h3>
                <div class="theme-selector">
                    <button class="theme-btn active" data-theme="neon">極客霓虹</button>
                    <button class="theme-btn" data-theme="sakura">夢幻櫻花</button>
                    <button class="theme-btn" data-theme="gold">金色慶典</button>
                    <button class="theme-btn" data-theme="green">二林綠野</button>
                </div>
            </div>

            <div>
                <h3 class="panel-section-title">🧸 互動貼圖裝飾</h3>
                <div class="sticker-grid">
                    <button class="sticker-btn" data-sticker="🎈">🎈</button>
                    <button class="sticker-btn" data-sticker="⭐">⭐</button>
                    <button class="sticker-btn" data-sticker="❤️">❤️</button>
                    <button class="sticker-btn" data-sticker="🕶️">🕶️</button>
                    <button class="sticker-btn" data-sticker="🎓">🎓</button>
                    <button class="sticker-btn" data-sticker="✨">✨</button>
                    <button class="sticker-btn" data-sticker="🍀">🍀</button>
                    <button class="sticker-btn" data-sticker="🎸">🎸</button>
                </div>
            </div>

            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 0.8rem;">
                <button class="action-btn" id="takePhotoBtn">
                    📸 拍照存念 (倒數 3 秒)
                </button>
                <button class="action-btn secondary" id="fullscreenBtn">
                    🖥️ 進入全螢幕展示
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden video stream and worker canvas -->
    <video id="webcamStream" autoplay playsinline></video>

    <script>
        const video = document.getElementById('webcamStream');
        const canvas = document.getElementById('interactiveCanvas');
        const ctx = canvas.getContext('2d');

        // Config inputs
        const clubNameInput = document.getElementById('clubNameInput');
        const welcomeMsgInput = document.getElementById('welcomeMsgInput');
        const headerSubtitleText = document.getElementById('headerSubtitleText');
        const energyBar = document.getElementById('energyBar');
        const motionBadge = document.getElementById('motionBadge');
        
        // Control buttons
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fsExitBtn = document.getElementById('fsExitBtn');
        const countdownOverlay = document.getElementById('countdownOverlay');
        const flashOverlay = document.getElementById('flashOverlay');
        const celebrationOverlay = document.getElementById('celebrationOverlay');
        const celebrationTitle = document.getElementById('celebrationTitle');
        const celebrationSub = document.getElementById('celebrationSub');

        // State variables
        let currentTheme = 'neon';
        let activeStickers = new Set(['🎈', '✨']); // Default stickers
        let streamActive = false;
        let isCountingDown = false;
        let energyValue = 0;
        let particles = [];
        let previousFrameData = null;
        let lastMotionTime = Date.now();
        let useFallback = false;

        // Hidden canvas for downsampled motion detection
        const motionCanvas = document.createElement('canvas');
        motionCanvas.width = 48;
        motionCanvas.height = 36;
        const mCtx = motionCanvas.getContext('2d');

        // Canvas dimensions (Standard HD ratio)
        canvas.width = 960;
        canvas.height = 720;

        // 1. Camera Initialization
        function initCamera() {
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 960 },
                    height: { ideal: 720 },
                    facingMode: "user"
                }, 
                audio: false 
            })
            .then(stream => {
                video.srcObject = stream;
                streamActive = true;
                useFallback = false;
                motionBadge.textContent = "📷 鏡頭感應中";
                motionBadge.style.color = "var(--primary)";
            })
            .catch(err => {
                console.warn("Unable to access webcam, fallback active:", err);
                useFallback = true;
                motionBadge.textContent = "🖱️ 滑鼠感應模式";
                motionBadge.style.color = "var(--accent)";
            });
        }

        // 2. Fallback / Fake Video Simulation (If no camera)
        let virtualTime = 0;
        function drawVirtualScene() {
            virtualTime += 0.02;
            
            // Draw a subtle tech gradient background
            const bgGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            if (currentTheme === 'neon') {
                bgGrad.addColorStop(0, '#020617'); bgGrad.addColorStop(1, '#0f172a');
            } else if (currentTheme === 'sakura') {
                bgGrad.addColorStop(0, '#FFF0F5'); bgGrad.addColorStop(1, '#FFD1DC');
            } else if (currentTheme === 'gold') {
                bgGrad.addColorStop(0, '#09090b'); bgGrad.addColorStop(1, '#18181b');
            } else if (currentTheme === 'green') {
                bgGrad.addColorStop(0, '#ECFDF5'); bgGrad.addColorStop(1, '#A7F3D0');
            }
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw a bouncing cool shape as a virtual avatar
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'var(--primary)';
            ctx.fillStyle = 'rgba(var(--primary-rgb), 0.2)';
            
            const bounceY = canvas.height/2 + Math.sin(virtualTime * 2) * 50;
            ctx.beginPath();
            ctx.arc(canvas.width/2, bounceY, 150, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(var(--accent-rgb), 0.15)';
            ctx.shadowColor = 'var(--accent)';
            const bounceX = canvas.width/2 + Math.cos(virtualTime * 1.5) * 100;
            ctx.beginPath();
            ctx.arc(bounceX, bounceY - 30, 80, 0, Math.PI * 2);
            ctx.fill();

            // Draw hint
            ctx.shadowBlur = 0;
            ctx.fillStyle = currentTheme === 'sakura' || currentTheme === 'green' ? '#00000088' : '#FFFFFF66';
            ctx.font = '700 22px "Noto Sans TC"';
            ctx.textAlign = 'center';
            ctx.fillText('👋 在螢幕上移動滑鼠來揮手互動！', canvas.width/2, canvas.height/2 + 250);
        }

        // 3. Motion Detection Algorithm (Pure Pixel-level Differences)
        function performMotionDetection() {
            if (!streamActive || video.paused || video.ended) return;

            // Draw current video frame scaled down onto the hidden motion canvas
            mCtx.drawImage(video, 0, 0, motionCanvas.width, motionCanvas.height);
            const currentFrame = mCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
            const data = currentFrame.data;

            if (previousFrameData) {
                let totalDiff = 0;
                let activePixels = 0;

                // Compare RGB values of each downsampled pixel
                for (let i = 0; i < data.length; i += 4) {
                    const rDiff = Math.abs(data[i] - previousFrameData[i]);
                    const gDiff = Math.abs(data[i+1] - previousFrameData[i+1]);
                    const bDiff = Math.abs(data[i+2] - previousFrameData[i+2]);
                    const diff = rDiff + gDiff + bDiff;

                    // If pixel color difference exceeds threshold
                    if (diff > 90) {
                        activePixels++;
                        totalDiff += diff;

                        // Map coords back to large high-res canvas
                        const pixelIndex = i / 4;
                        const px = pixelIndex % motionCanvas.width;
                        const py = Math.floor(pixelIndex / motionCanvas.width);

                        // Map to high-res canvas coordinates (Mirror horizontally if camera is mirrored)
                        const cx = canvas.width - (px / motionCanvas.width) * canvas.width;
                        const cy = (py / motionCanvas.height) * canvas.height;

                        // Spawn random particles on active coordinates
                        if (Math.random() < 0.25) {
                            spawnParticle(cx, cy);
                        }
                    }
                }

                // If enough movement is detected, fill the Welcome Energy Bar
                const motionRatio = activePixels / (motionCanvas.width * motionCanvas.height);
                if (motionRatio > 0.03) {
                    energyValue = Math.min(100, energyValue + motionRatio * 15);
                    lastMotionTime = Date.now();
                }
            }

            // Save current frame data for next iteration
            previousFrameData = data;
        }

        // Run motion detection loop every 80ms for optimal performance
        setInterval(performMotionDetection, 80);

        // 4. Particle System
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 4;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * -5 - 1; // Always floats upwards
                this.gravity = 0.08;
                this.color = color;
                this.alpha = 1;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.015;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity; // Apply light gravity
                this.alpha -= this.decay;
                if (this.alpha < 0) this.alpha = 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                
                // Draw a beautiful star shape or circle
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Spawn a single colorful particle
        function spawnParticle(x, y) {
            let colorPool = ['#FF007F', '#00F0FF', '#FFEC00', '#AB00FF', '#00FF66'];
            
            if (currentTheme === 'sakura') {
                colorPool = ['#FFB7C5', '#FF8E97', '#FFC5D3', '#F27490', '#FFFFFF'];
            } else if (currentTheme === 'gold') {
                colorPool = ['#FFDF00', '#F0A500', '#FFEC8B', '#D9A441', '#FFD700'];
            } else if (currentTheme === 'green') {
                colorPool = ['#10B981', '#34D399', '#6EE7B7', '#A7F3D0', '#34D399'];
            }

            const randColor = colorPool[Math.floor(Math.random() * colorPool.length)];
            particles.push(new Particle(x, y, randColor));
        }

        // Sparkle blast on celebration
        function triggerCelebrationBlast() {
            for (let i = 0; i < 80; i++) {
                const rx = Math.random() * canvas.width;
                const ry = canvas.height;
                const p = new Particle(rx, ry, 'yellow');
                p.speedY = Math.random() * -12 - 5;
                p.speedX = Math.random() * 8 - 4;
                p.size = Math.random() * 12 + 6;
                particles.push(p);
            }
        }

        // Mouse interaction for fallback or fun desktop engagement
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = ((e.clientX - rect.left) / rect.width) * canvas.width;
            const mouseY = ((e.clientY - rect.top) / rect.height) * canvas.height;

            // Spawn particles at cursor position
            for (let i = 0; i < 3; i++) {
                spawnParticle(mouseX, mouseY);
            }
            
            // Increment energy slightly on mouse wave
            energyValue = Math.min(100, energyValue + 0.8);
            lastMotionTime = Date.now();
        });

        // 5. Main Canvas Rendering Loop (Runs at 60fps)
        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Video Feed or Virtual Scene Fallback
            if (streamActive && !useFallback) {
                ctx.save();
                // Mirror horizontally for intuitive self-viewing
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            } else {
                drawVirtualScene();
            }

            // Draw Active Floating Stickers
            ctx.save();
            ctx.font = '60px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            let stickerIdx = 0;
            activeStickers.forEach(sticker => {
                // Floating wavy position calculation
                const wX = 80 + stickerIdx * 90;
                const wY = 120 + Math.sin(Date.now() / 300 + stickerIdx) * 15;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
                ctx.fillText(sticker, wX, wY);
                stickerIdx++;
            });
            ctx.restore();

            // Update & Draw Interactive Particles
            particles.forEach((p, idx) => {
                p.update();
                p.draw();
                if (p.alpha <= 0) {
                    particles.splice(idx, 1);
                }
            });

            // Draw Welcome Card Overlays & Borders
            drawBoardDecorations();

            // Natural Energy decay
            if (Date.now() - lastMotionTime > 1500) {
                energyValue = Math.max(0, energyValue - 0.4);
            }
            energyBar.style.width = `${energyValue}%`;

            // Active Celebration when Welcome Energy reaches 100%
            if (energyValue >= 100 && !celebrationOverlay.classList.contains('active')) {
                celebrationOverlay.classList.add('active');
                triggerCelebrationBlast();
                setTimeout(() => {
                    celebrationOverlay.classList.remove('active');
                    energyValue = 0; // Reset
                }, 5000);
            }

            requestAnimationFrame(renderLoop);
        }

        // 6. Draw Custom Overlays & Borders
        function drawBoardDecorations() {
            // Theme Colors
            let primaryColor = '#F472B6';
            let accentColor = '#38BDF8';
            let bannerBg = 'rgba(15, 23, 42, 0.85)';
            let textColor = '#F1F5F9';
            let descColor = '#94A3B8';

            if (currentTheme === 'sakura') {
                primaryColor = '#EC4899';
                accentColor = '#FF8E97';
                bannerBg = 'rgba(255, 240, 245, 0.9)';
                textColor = '#4A044E';
                descColor = '#BE185D';
            } else if (currentTheme === 'gold') {
                primaryColor = '#F59E0B';
                accentColor = '#FBBF24';
                bannerBg = 'rgba(24, 24, 27, 0.9)';
                textColor = '#F4F4F5';
                descColor = '#A1A1AA';
            } else if (currentTheme === 'green') {
                primaryColor = '#10B981';
                accentColor = '#34D399';
                bannerBg = 'rgba(236, 253, 245, 0.9)';
                textColor = '#064E3B';
                descColor = '#047857';
            }

            // Draw Border Frame
            ctx.save();
            ctx.lineWidth = 14;
            // Create a gorgeous gradient border
            const borderGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            borderGrad.addColorStop(0, primaryColor);
            borderGrad.addColorStop(0.5, accentColor);
            borderGrad.addColorStop(1, primaryColor);
            ctx.strokeStyle = borderGrad;
            ctx.strokeRect(7, 7, canvas.width - 14, canvas.height - 14);
            ctx.restore();

            // Bottom Banner Card
            ctx.save();
            ctx.fillStyle = bannerBg;
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
            
            // Draw rounded rectangle for bottom panel
            const rx = 40;
            const ry = canvas.height - 180;
            const rWidth = canvas.width - 80;
            const rHeight = 130;
            const radius = 24;

            ctx.beginPath();
            ctx.moveTo(rx + radius, ry);
            ctx.lineTo(rx + rWidth - radius, ry);
            ctx.quadraticCurveTo(rx + rWidth, ry, rx + rWidth, ry + radius);
            ctx.lineTo(rx + rWidth, ry + rHeight - radius);
            ctx.quadraticCurveTo(rx + rWidth, ry + rHeight, rx + rWidth - radius, ry + rHeight);
            ctx.lineTo(rx + radius, ry + rHeight);
            ctx.quadraticCurveTo(rx, ry + rHeight, rx, ry + rHeight - radius);
            ctx.lineTo(rx, ry + radius);
            ctx.quadraticCurveTo(rx, ry, rx + radius, ry);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // Text content inside bottom banner
            ctx.save();
            ctx.textAlign = 'center';

            // Club Name Text
            ctx.fillStyle = textColor;
            ctx.font = '900 42px "Noto Sans TC"';
            const clubName = clubNameInput.value || "二林高級工商";
            ctx.fillText(clubName, canvas.width / 2, canvas.height - 122);

            // Subtitle Welcome slogan
            ctx.fillStyle = descColor;
            ctx.font = '700 24px "Noto Sans TC"';
            const slogan = welcomeMsgInput.value || "熱烈歡迎學員蒞臨體驗！";
            ctx.fillText(slogan, canvas.width / 2, canvas.height - 76);
            ctx.restore();
        }

        // Start rendering
        initCamera();
        requestAnimationFrame(renderLoop);

        // 7. Theme selectors
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const selected = btn.dataset.theme;
                currentTheme = selected;
                
                // Clear body theme classes
                document.body.className = '';
                document.body.classList.add(`theme-${selected}`);
            };
        });

        // 8. Sticker Selection Toggle
        document.querySelectorAll('.sticker-btn').forEach(btn => {
            const sticker = btn.dataset.sticker;
            // Check default state
            if (activeStickers.has(sticker)) {
                btn.classList.add('active');
            }

            btn.onclick = () => {
                if (activeStickers.has(sticker)) {
                    activeStickers.delete(sticker);
                    btn.classList.remove('active');
                } else {
                    activeStickers.add(sticker);
                    btn.classList.add('active');
                }
            };
        });

        // 9. Input Text bindings
        clubNameInput.oninput = () => {
            celebrationTitle.textContent = `🎉 歡迎來到 ${clubNameInput.value || '社團'} 🎉`;
        };
        welcomeMsgInput.oninput = () => {
            headerSubtitleText.textContent = `${clubNameInput.value} ── ${welcomeMsgInput.value}`;
            celebrationSub.textContent = welcomeMsgInput.value;
        };

        // 10. Snapshot Capture Feature (3s Countdown + flash + download)
        takePhotoBtn.onclick = () => {
            if (isCountingDown) return;
            isCountingDown = true;

            let count = 3;
            countdownOverlay.textContent = count;
            countdownOverlay.style.display = 'block';

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownOverlay.textContent = count;
                } else {
                    clearInterval(interval);
                    countdownOverlay.style.display = 'none';
                    
                    // Flash effect
                    flashOverlay.style.opacity = '1';
                    setTimeout(() => { flashOverlay.style.opacity = '0'; }, 300);

                    // Perform download
                    downloadSnapshot();
                    isCountingDown = false;
                }
            }, 1000);
        };

        function downloadSnapshot() {
            try {
                // Ensure we get the raw canvas image
                const image = canvas.toDataURL("image/jpeg", 0.95);
                const link = document.createElement('a');
                link.download = `${clubNameInput.value || '社團'}_歡迎紀念照.jpg`;
                link.href = image;
                link.click();
            } catch (err) {
                console.error("Unable to save image due to security restriction:", err);
                alert("圖片導出失敗！請檢查您的相機授權或嘗試在別的瀏覽器打開。");
            }
        }

        // 11. Fullscreen Controllers
        const boardWrapper = document.getElementById('boardWrapper');

        function enterFullscreen() {
            document.body.classList.add('fullscreen-mode');
            // Try to request browser full screen on the wrapper
            if (boardWrapper.requestFullscreen) {
                boardWrapper.requestFullscreen().catch(err => {
                    console.log("Full screen blocked or not supported:", err);
                });
            }
        }

        function exitFullscreen() {
            document.body.classList.remove('fullscreen-mode');
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(err => console.log(err));
            }
        }

        fullscreenBtn.onclick = enterFullscreen;
        fsExitBtn.onclick = exitFullscreen;

        // Esc key to exit full screen state
        document.onfullscreenchange = () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('fullscreen-mode');
            }
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                exitFullscreen();
            }
        });
    </script>
</body>
</html>
